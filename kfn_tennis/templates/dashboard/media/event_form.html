{% extends "dashboard/base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<h1 class="h3 mb-4">{{ page_title }}</h1>

<form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label" for="{{ form.title.id_for_label }}">Название мероприятия</label>
        {{ form.title }}
    </div>

    <div class="mb-3">
        <label class="form-label" for="{{ form.description.id_for_label }}">Описание</label>
        {{ form.description }}
    </div>

    <div class="mb-3">
        <label class="form-label" for="{{ form.date.id_for_label }}">Дата</label>
        {{ form.date }}
    </div>

    <div class="mb-4">
        <label class="form-label" for="{{ form.cover.id_for_label }}">Обложка</label>
        {{ form.cover }}
        {% if object and object.cover %}
            <div class="mt-2">
                <img src="{{ object.cover.url }}" alt="{{ object.title }}" class="preview-image">
            </div>
        {% endif %}
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-accent">{{ submit_text }}</button>
        <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
