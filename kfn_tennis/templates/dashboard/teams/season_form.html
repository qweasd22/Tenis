{% extends "dashboard/base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<h1 class="h3 mb-4">{{ page_title }}</h1>

<form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label" for="{{ form.year.id_for_label }}">Год</label>
        {{ form.year }}
    </div>

    <div class="mb-4">
        <label class="form-label" for="{{ form.team_list_pdf.id_for_label }}">Список игроков PDF</label>
        {{ form.team_list_pdf }}
        {% if object and object.team_list_pdf %}
            <div class="mt-2">
                <a href="{{ object.team_list_pdf.url }}" target="_blank">Текущий файл</a>
            </div>
        {% endif %}
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-accent">{{ submit_text }}</button>
        <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
