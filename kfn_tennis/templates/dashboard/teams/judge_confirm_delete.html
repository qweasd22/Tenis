{% extends "dashboard/base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<h1 class="h3 mb-3">{{ page_title }}</h1>

<div class="alert alert-warning">
    Вы действительно хотите удалить судью <strong>{{ object.full_name }}</strong>?
</div>

<ul class="list-group mb-4">
    <li class="list-group-item"><strong>Категория:</strong> {{ object.category }}</li>
</ul>

<form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
