{% extends "dashboard/base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<h1 class="h3 mb-4">{{ page_title }}</h1>

<form method="post" novalidate>
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label" for="{{ form.name.id_for_label }}">Название</label>
        {{ form.name }}
    </div>

    <div class="mb-3">
        <label class="form-label" for="{{ form.slug.id_for_label }}">Slug</label>
        {{ form.slug }}
    </div>

    <div class="mb-4">
        <label class="form-label" for="{{ form.order.id_for_label }}">Порядок</label>
        {{ form.order }}
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-accent">{{ submit_text }}</button>
        <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
